<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src ws://127.0.0.1:*; style-src 'unsafe-inline'; script-src 'self'" />
    <title>WorkerKing</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
      body { display: flex; flex-direction: column; background: Canvas; color: CanvasText; }
      header {
        padding: 10px 14px;
        font-weight: 600;
        border-bottom: 1px solid rgba(128,128,128,0.25);
        display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
      }
      #status { font-weight: 400; font-size: 12px; opacity: 0.7; }
      #log { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
      .bubble {
        max-width: 78%; padding: 8px 12px; border-radius: 14px; white-space: pre-wrap;
        line-height: 1.35; word-break: break-word;
      }
      .bubble--you { align-self: flex-end; background: #2a6cff; color: #fff; border-bottom-right-radius: 4px; }
      .bubble--wk { align-self: flex-start; background: rgba(128,128,128,0.18); border-bottom-left-radius: 4px; }
      #composer { display: flex; gap: 8px; padding: 10px; border-top: 1px solid rgba(128,128,128,0.25); }
      #input { flex: 1; padding: 9px 12px; border-radius: 10px; border: 1px solid rgba(128,128,128,0.4); background: Field; color: FieldText; font: inherit; }
      button { padding: 9px 16px; border: none; border-radius: 10px; background: #2a6cff; color: #fff; font: inherit; cursor: pointer; }
      button:hover { filter: brightness(1.08); }
    </style>
  </head>
  <body>
    <header><span>WorkerKing</span><span id="status">connecting…</span></header>
    <div id="log"></div>
    <form id="composer">
      <input id="input" type="text" placeholder="Ask WorkerKing…" autocomplete="off" autofocus />
      <button type="submit">Send</button>
    </form>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
