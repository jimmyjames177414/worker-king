<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src ws://127.0.0.1:* ws://localhost:*; style-src 'unsafe-inline'; script-src 'self'" />
    <title>WorkerKing</title>
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
      body { display: flex; flex-direction: column; background: Canvas; color: CanvasText; }
      header {
        padding: 10px 14px;
        font-weight: 600;
        border-bottom: 1px solid rgba(128,128,128,0.25);
        display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
      }
      #status { font-weight: 400; font-size: 12px; opacity: 0.7; }
      #log { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
      .bubble {
        max-width: 78%; padding: 8px 12px; border-radius: 14px; white-space: pre-wrap;
        line-height: 1.35; word-break: break-word;
      }
      .bubble--you { align-self: flex-end; background: #2a6cff; color: #fff; border-bottom-right-radius: 4px; }
      .bubble--wk { align-self: flex-start; background: rgba(128,128,128,0.18); border-bottom-left-radius: 4px; position: relative; }
      /* Copy affordances (message + code), revealed on hover */
      .bubble__actions { position: absolute; top: 4px; right: 6px; opacity: 0; transition: opacity 0.12s; }
      .bubble--wk:hover .bubble__actions { opacity: 1; }
      .bubble__copy { background: rgba(128,128,128,0.35); color: inherit; font-size: 12px; padding: 2px 6px; border-radius: 6px; line-height: 1; }
      .bubble--wk pre.code { position: relative; }
      .code__copy { position: absolute; top: 5px; right: 5px; background: rgba(128,128,128,0.4); color: inherit;
        font-size: 11px; padding: 2px 7px; border-radius: 6px; opacity: 0; transition: opacity 0.12s; }
      .bubble--wk pre.code:hover .code__copy { opacity: 1; }
      /* Markdown inside assistant bubbles */
      .bubble--wk p { margin: 0 0 6px; } .bubble--wk p:last-child { margin-bottom: 0; }
      .bubble--wk ul, .bubble--wk ol { margin: 4px 0; padding-left: 20px; }
      .bubble--wk code { font-family: ui-monospace, monospace; font-size: 0.92em; background: rgba(128,128,128,0.22); padding: 1px 4px; border-radius: 4px; }
      .bubble--wk pre.code { background: rgba(0,0,0,0.28); padding: 8px 10px; border-radius: 8px; overflow-x: auto; margin: 6px 0; }
      .bubble--wk pre.code code { background: none; padding: 0; }
      .bubble--wk a { color: inherit; text-decoration: underline; }
      /* Header buttons + task count badge */
      #tasks-toggle { position: relative; }
      #tasks-count { display: none; }
      #tasks-count.has { display: inline-block; min-width: 16px; text-align: center; font-size: 11px; font-weight: 700;
        background: #2a6cff; color: #fff; border-radius: 9px; padding: 0 5px; margin-left: 4px; }
      /* Tasks panel (slide-over, mirrors settings) */
      #tasks-panel { display: none; position: absolute; inset: 0; background: Canvas; overflow-y: auto; padding: 14px 16px; z-index: 5; }
      #tasks-panel.open { display: block; }
      #tasks-panel h2 { margin: 4px 0 12px; }
      #tasks-list:empty::after { content: 'No delegated tasks yet.'; opacity: 0.6; font-size: 13px; }
      .task { border: 1px solid rgba(128,128,128,0.3); border-radius: 10px; padding: 8px 10px; margin-bottom: 8px; }
      .task__head { display: flex; align-items: center; gap: 8px; }
      .task__title { font-size: 13px; word-break: break-word; }
      .task__detail { font-size: 12px; opacity: 0.8; margin-top: 5px; white-space: pre-wrap; word-break: break-word; }
      .task__badge { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700;
        padding: 2px 6px; border-radius: 6px; background: rgba(128,128,128,0.25); flex: none; }
      .task--running .task__badge, .task--queued .task__badge { background: #2a6cff; color: #fff; }
      .task--done .task__badge { background: #17c964; color: #04210f; }
      .task--error .task__badge { background: #f5544a; color: #fff; }
      .task--cancelled .task__badge { background: rgba(128,128,128,0.4); }
      #tasks-close { margin-top: 8px; background: rgba(128,128,128,0.25); color: inherit; }
      #composer { display: flex; gap: 8px; padding: 10px; border-top: 1px solid rgba(128,128,128,0.25); }
      #input { flex: 1; padding: 9px 12px; border-radius: 10px; border: 1px solid rgba(128,128,128,0.4); background: Field; color: FieldText; font: inherit; }
      button { padding: 9px 16px; border: none; border-radius: 10px; background: #2a6cff; color: #fff; font: inherit; cursor: pointer; }
      button:hover { filter: brightness(1.08); }
      #gear, #clear, #tasks-toggle { background: transparent; color: inherit; font-size: 16px; padding: 2px 6px; }
      /* Spoken (voice) turns get a subtle mic marker */
      .bubble--spoken::after { content: '🎙'; position: absolute; bottom: 2px; right: 6px; font-size: 10px; opacity: 0.45; }
      .bubble--you.bubble--spoken { position: relative; }
      #settings { display: none; position: absolute; inset: 0; background: Canvas; overflow-y: auto; padding: 14px 16px; z-index: 5; }
      #settings.open { display: block; }
      #settings h2 { margin: 4px 0 12px; }
      #settings label { display: block; margin: 10px 0; font-size: 13px; font-weight: 600; }
      #settings label.check { font-weight: 400; display: flex; align-items: center; gap: 8px; }
      #settings input:not([type=checkbox]), #settings textarea, #settings select {
        display: block; width: 100%; margin-top: 4px; padding: 7px 9px; border-radius: 8px;
        border: 1px solid rgba(128,128,128,0.4); background: Field; color: FieldText; font: inherit; box-sizing: border-box;
      }
      #settings .row { display: flex; gap: 8px; align-items: center; }
      #settings .row input { margin-top: 0; }
      #settings hr { border: none; border-top: 1px solid rgba(128,128,128,0.25); margin: 14px 0; }
      #settings .ok { color: #17c964; } #settings .warn { color: #f5a623; }
      #settings .status { font-size: 12px; opacity: 0.7; min-height: 16px; }
      #settings-close { margin-top: 8px; background: rgba(128,128,128,0.25); color: inherit; }
    </style>
  </head>
  <body>
    <header>
      <span>WorkerKing</span>
      <span class="row" style="display:flex;gap:10px;align-items:center">
        <span id="status">connecting…</span>
        <button id="tasks-toggle" title="Tasks">📋<span id="tasks-count"></span></button>
        <button id="clear" title="Clear conversation">🗑</button>
        <button id="gear" title="Settings">⚙</button>
      </span>
    </header>
    <div id="log"></div>
    <form id="composer">
      <input id="input" type="text" placeholder="Ask WorkerKing…" autocomplete="off" autofocus />
      <button type="submit">Send</button>
    </form>
    <section id="tasks-panel">
      <h2>Tasks</h2>
      <div id="tasks-list"></div>
      <button id="tasks-close">Close</button>
    </section>
    <section id="settings">
      <div id="settings-body"></div>
      <button id="settings-close">Close</button>
    </section>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
